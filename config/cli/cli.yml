# Abbey Root CLI metadata
#
# Purpose:
#   Single source of truth for abbey command descriptions, categories,
#   aliases, examples, nested commands, and generated documentation.

version: 1

cli:
  name: abbey
  description: Abbey Root Toolkit
  tagline: AI-assisted infrastructure lab and reusable project framework.

categories:
  core:
    description: Core CLI commands

  workflow:
    description: Workflow commands

  docs:
    description: Documentation commands

  ai:
    description: AI and knowledge commands

  lab:
    description: Lab infrastructure commands

  site:
    description: Website commands

  content:
    description: Content management commands

commands:
  help:
    category: core
    description: Show Abbey Root CLI help.
    usage: abbey help
    hidden: false
    examples:
      - abbey help

  doctor:
    category: core
    description: Run repository and environment health checks.
    usage: abbey doctor
    hidden: false
    examples:
      - abbey doctor

  status:
    category: core
    description: Show local system and project status.
    usage: abbey status
    hidden: false
    examples:
      - abbey status

  session:
    category: workflow
    description: Start and review Abbey Root work sessions.
    usage: abbey session [command]
    hidden: false
    subcommands:
      start:
        description: Show Abbey session startup information.
        usage: abbey session
      context:
        description: Generate an upload-ready session context file.
        usage: abbey session context [--stdout | --output FILE]

      review:
        description: Review a selected session update or the oldest unreviewed update with Codex.
        usage: abbey session review [file]

    examples:
      - abbey session
      - abbey session context
      - abbey session review
      - abbey session review docs/session-updates/2026-07-10-doctor-robert-plant-publishing-workflow.md

  journal:
    category: workflow
    description: Create or open an Abbey Root journal entry.
    usage: abbey journal <title>
    hidden: false
    examples:
      - abbey journal "Architecture Framework Introduced"

  site:
    category: site
    description: Build, run, and publish the BradCooke.com website.
    usage: abbey site <command>
    hidden: false
    subcommands:
      build:
        description: Build the Astro production site.
        usage: abbey site build

      publish:
        description: Build and publish the site to GitHub Pages.
        usage: abbey site publish [--dry-run]

      status:
        description: Show the Astro development server status.
        usage: abbey site status

      start:
        description: Start the Astro development server.
        usage: abbey site start

      stop:
        description: Stop the Astro development server.
        usage: abbey site stop

      restart:
        description: Restart the Astro development server.
        usage: abbey site restart

    examples:
      - abbey site build
      - abbey site publish --dry-run
      - abbey site publish
      - abbey site start

  plant:
    category: content
    description: Manage, validate, and publish plant workspaces.
    usage: abbey plant <command>
    hidden: false
    subcommands:
      validate:
        description: Validate a plant workspace against the Plant Model.
        usage: abbey plant validate <slug>
      publish:
        description: Generate Astro content and copy selected public images.
        usage: abbey plant publish <slug>
    examples:
      - abbey plant validate doctor-robert
      - abbey plant publish doctor-robert

  knowledge:
    category: ai
    description: Build and view Abbey knowledge context.
    usage: abbey knowledge <command>
    hidden: false
    examples:
      - abbey knowledge build

  context:
    category: ai
    description: Build or inspect Abbey AI context.
    usage: abbey context <command>
    hidden: false
    examples:
      - abbey context

  ai:
    category: ai
    description: Start Abbey AI helper commands.
    usage: abbey ai <command>
    hidden: false
    examples:
      - abbey ai

  lab:
    category: lab
    description: Inspect and manage Abbey Root lab infrastructure.
    usage: abbey lab <command>
    hidden: false
    subcommands:
      check:
        description: Run read-only health checks against managed lab hosts.
        usage: abbey lab check
    examples:
      - abbey lab check

  version:
    category: core
    description: Show project version and framework information.
    usage: abbey version
    hidden: false
    examples:
      - abbey version
