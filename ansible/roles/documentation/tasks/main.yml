---
- name: Ensure generated documentation directory exists
  file:
    path: "{{ playbook_dir }}/../../docs/generated"
    state: directory
    mode: '0755'

- name: Generate server documentation
  template:
    src: servers.md.j2
    dest: "{{ playbook_dir }}/../../docs/generated/servers.md"

- name: Generate services documentation
  template:
    src: services.md.j2
    dest: "{{ playbook_dir }}/../../docs/generated/services.md"

- name: Generate inventory documentation
  template:
    src: inventory.md.j2
    dest: "{{ playbook_dir }}/../../docs/generated/inventory.md"

- name: Find Ansible roles
  find:
    paths: "{{ playbook_dir }}/../roles"
    file_type: directory
    depth: 1
  register: ansible_roles

- name: Generate automation documentation
  template:
    src: automation.md.j2
    dest: "{{ playbook_dir }}/../../docs/generated/automation.md"

- name: Generate network documentation
  template:
    src: network.md.j2
    dest: "{{ playbook_dir }}/../../docs/generated/network.md"

- name: Generate container documentation
  template:
    src: containers.md.j2
    dest: "{{ playbook_dir }}/../../docs/generated/containers.md"

- name: Generate architecture documentation
  template:
    src: architecture.md.j2
    dest: "{{ playbook_dir }}/../../docs/generated/architecture.md"

- name: Generate lab summary documentation
  ansible.builtin.template:
    src: lab-summary.md.j2
    dest: "{{ playbook_dir }}/../../docs/generated/lab-summary.md"
    mode: "0644"
