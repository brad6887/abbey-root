---
- name: Ensure generated documentation directory exists
  file:
    path: "{{ playbook_dir }}/../../docs/generated"
    state: directory
    mode: '0755'

- name: Generate server documentation
  template:
    src: servers.md.j2
    dest: "{{ playbook_dir }}/../../docs/generated/servers.md"

- name: Generate services documentation
  template:
    src: services.md.j2
    dest: "{{ playbook_dir }}/../../docs/generated/services.md"
