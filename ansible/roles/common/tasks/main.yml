---
###############################################################################
# Common Packages
###############################################################################

- name: Install common tools on Debian/Ubuntu
  ansible.builtin.apt:
    name:
      - git
      - vim
      - curl
      - wget
      - tree
      - htop
      - tmux
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install common tools on Rocky/RHEL
  ansible.builtin.dnf:
    name:
      - git
      - vim
      - curl
      - wget
      - tree
      - htop
      - tmux
      - bash-completion
      - bind-utils
    state: present
  when: ansible_os_family == "RedHat"

###############################################################################
# Git Configuration
###############################################################################

- name: Configure Git pull strategy
  ansible.builtin.command:
    cmd: git config --global pull.rebase true
  changed_when: false

- name: Configure Git fetch pruning
  ansible.builtin.command:
    cmd: git config --global fetch.prune true
  changed_when: false

- name: Configure Git automatic stash during rebase
  ansible.builtin.command:
    cmd: git config --global rebase.autoStash true
  changed_when: false

###############################################################################
# Abbey Shell
###############################################################################

- name: Install Abbey shell aliases
  ansible.builtin.copy:
    src: abbey-aliases.sh
    dest: /etc/profile.d/abbey-aliases.sh
    owner: root
    group: root
    mode: "0644"

- name: Install Abbey shell functions
  ansible.builtin.copy:
    src: abbey-functions.sh
    dest: /etc/profile.d/abbey-functions.sh
    owner: root
    group: root
    mode: "0644"
