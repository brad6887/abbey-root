---
###############################################################################
# Common Packages
###############################################################################

- name: Install common tools on Debian/Ubuntu
  ansible.builtin.apt:
    name:
      - git
      - vim
      - curl
      - wget
      - tree
      - htop
      - tmux
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install common tools on Rocky/RHEL
  ansible.builtin.dnf:
    name:
      - git
      - vim
      - curl
      - wget
      - tree
      - htop
      - tmux
      - bash-completion
      - bind-utils
    state: present
  when: ansible_os_family == "RedHat"

###############################################################################
# Git Configuration
###############################################################################

- name: Install Git configuration
  ansible.builtin.copy:
    src: gitconfig
    dest: "/home/{{ ansible_user }}/.gitconfig"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"

###############################################################################
# Abbey Shell
###############################################################################

- name: Install Abbey shell aliases
  ansible.builtin.copy:
    src: abbey-aliases.sh
    dest: /etc/profile.d/abbey-aliases.sh
    owner: root
    group: root
    mode: "0644"

- name: Install Abbey shell functions
  ansible.builtin.copy:
    src: abbey-functions.sh
    dest: /etc/profile.d/abbey-functions.sh
    owner: root
    group: root
    mode: "0644"
