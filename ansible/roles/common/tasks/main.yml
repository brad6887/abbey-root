---
- name: Install common tools on Debian/Ubuntu
  ansible.builtin.apt:
    name:
      - git
      - vim
      - curl
      - wget
      - tree
      - htop
      - tmux
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: Install common tools on Rocky/RHEL
  ansible.builtin.dnf:
    name:
      - git
      - vim
      - curl
      - wget
      - tree
      - htop
      - tmux
      - bash-completion
      - bind-utils
    state: present
  when: ansible_os_family == "RedHat"

- name: Install Abbey shell aliases
  copy:
    src: abbey-aliases.sh
    dest: /etc/profile.d/abbey-aliases.sh
    owner: root
    group: root
    mode: "0644"

- name: Install Abbey shell functions
  copy:
    src: abbey-functions.sh
    dest: /etc/profile.d/abbey-functions.sh
    owner: root
    group: root
    mode: "0644"
