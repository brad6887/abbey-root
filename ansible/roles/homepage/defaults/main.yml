---
homepage_owner: bcooke
homepage_group: bcooke

homepage_config_dir: /home/bcooke/docker/homepage/config
homepage_compose_dir: /home/bcooke/docker/homepage
homepage_container: homepage

homepage_container:
  service_name: homepage
  image: ghcr.io/gethomepage/homepage:latest
  container_name: homepage
  restart_policy: unless-stopped
  ports:
    - "3000:3000"
  volumes:
    - "/home/bcooke/docker/homepage/config:/app/config"
  environment: {}

homepage_widgets:
  resources:
    cpu: true
    memory: true
    disk: /
  search:
    provider: duckduckgo
    target: _blank

homepage_bookmarks: []

homepage_docker_servers: []
