---
- name: Check Abbey Root lab health
  hosts: all
  gather_facts: true
  become: false

  tasks:
    - name: Read root filesystem usage
      ansible.builtin.command:
        argv:
          - df
          - -P
          - /
      register: root_filesystem
      changed_when: false
      failed_when: false

    - name: Read system load
      ansible.builtin.command:
        argv:
          - cat
          - /proc/loadavg
      register: system_load
      changed_when: false
      failed_when: false

    - name: Read processes in uninterruptible sleep
      ansible.builtin.shell: |
        ps -eo state,pid,comm,wchan:32,args |
        awk '$1 == "D" {print}'
      register: blocked_processes
      changed_when: false
      failed_when: false

    - name: Read failed systemd units
      ansible.builtin.command:
        argv:
          - systemctl
          - --failed
          - --no-legend
          - --plain
      register: failed_systemd_units
      changed_when: false
      failed_when: false

    - name: Display host health summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Address: {{ ansible_host | default(inventory_hostname) }}"
          - "OS: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Kernel: {{ ansible_kernel }}"
          - >-
            Uptime:
            {{ ansible_uptime_seconds | int // 86400 }}d
            {{ (ansible_uptime_seconds | int % 86400) // 3600 }}h
            {{ (ansible_uptime_seconds | int % 3600) // 60 }}m
          - >-
            Memory:
            {{ ansible_memory_mb.real.used | default('unknown') }} MB used /
            {{ ansible_memory_mb.real.total | default('unknown') }} MB total
          - >-
            Swap:
            {{ ansible_memory_mb.swap.used | default('unknown') }} MB used /
            {{ ansible_memory_mb.swap.total | default('unknown') }} MB total
          - "Load: {{ system_load.stdout | default('unavailable') }}"
          - "D-state processes: {{ blocked_processes.stdout_lines | default([]) | length }}"
          - "Root filesystem: {{ (root_filesystem.stdout_lines | default([]) | last) | default('unavailable') }}"
          - "Failed systemd units: {{ failed_systemd_units.stdout_lines | default([]) | length }}"

    - name: Warn when root filesystem usage is unavailable
      ansible.builtin.debug:
        msg: "WARN Unable to read root filesystem usage"
      when: root_filesystem.rc | default(1) != 0

    - name: Warn when failed systemd units exist
      ansible.builtin.debug:
        msg: >-
          WARN Failed systemd units:
          {{ failed_systemd_units.stdout_lines | join(', ') }}
      when: failed_systemd_units.stdout_lines | default([]) | length > 0

    - name: Warn when processes are stuck in uninterruptible sleep
      ansible.builtin.debug:
        msg: >-
          WARN D-state processes:
          {{ blocked_processes.stdout_lines | join(' | ') }}
      when: blocked_processes.stdout_lines | default([]) | length > 0


- name: Check NVIDIA and Ollama health
  hosts: all
  gather_facts: false
  become: false

  tasks:
    - name: Read timeout-protected NVIDIA metrics
      ansible.builtin.command:
        argv:
          - timeout
          - "15"
          - nvidia-smi
          - --query-gpu=driver_version,temperature.gpu,utilization.gpu,memory.used,memory.total
          - --format=csv,noheader,nounits
      register: nvidia_metrics
      changed_when: false
      failed_when: false
      when: ai_node | default(false) | bool

    - name: Read active NVIDIA process count
      ansible.builtin.shell: |
        timeout 15 nvidia-smi \
          --query-compute-apps=pid \
          --format=csv,noheader,nounits |
        awk 'NF {count++} END {print count+0}'
      register: nvidia_process_count
      changed_when: false
      failed_when: false
      when:
        - ai_node | default(false) | bool
        - nvidia_metrics.rc | default(1) == 0

    - name: Read Ollama service status
      ansible.builtin.command:
        argv:
          - systemctl
          - is-active
          - ollama
      register: ollama_service
      changed_when: false
      failed_when: false
      when: ai_node | default(false) | bool

    - name: Read loaded Ollama models
      ansible.builtin.command:
        argv:
          - ollama
          - ps
      register: ollama_models
      changed_when: false
      failed_when: false
      when: ai_node | default(false) | bool

    - name: Count llama-server processes
      ansible.builtin.shell: |
        pgrep -c -x llama-server || true
      register: llama_server_count
      changed_when: false
      failed_when: false
      when: ai_node | default(false) | bool

    - name: Display NVIDIA and Ollama health summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "NVIDIA status: {{ 'healthy' if nvidia_metrics.rc | default(1) == 0 else 'unavailable or timed out' }}"
          - "NVIDIA driver: {{ nvidia_values[0] | default('unavailable') }}"
          - "GPU temperature: {{ nvidia_values[1] | default('unknown') }} C"
          - "GPU utilization: {{ nvidia_values[2] | default('unknown') }}%"
          - >-
            GPU memory:
            {{ nvidia_values[3] | default('unknown') }} MiB used /
            {{ nvidia_values[4] | default('unknown') }} MiB total
          - "Active NVIDIA processes: {{ nvidia_process_count.stdout | default('unknown') }}"
          - "Ollama service: {{ ollama_service.stdout | default('unavailable') }}"
          - >-
            Loaded Ollama models:
            {{
              (
                ollama_models.stdout_lines | default([])
                | reject('match', '^NAME')
                | reject('equalto', '')
                | list
                | length
              )
            }}
          - "llama-server processes: {{ llama_server_count.stdout | default('unknown') }}"
      vars:
        nvidia_values: >-
          {{
            nvidia_metrics.stdout.split(', ')
            if nvidia_metrics.rc | default(1) == 0
            else []
          }}
      when: ai_node | default(false) | bool

    - name: Warn when NVIDIA status check fails or times out
      ansible.builtin.debug:
        msg: >-
          WARN nvidia-smi failed or timed out with return code
          {{ nvidia_metrics.rc | default('unknown') }}
      when:
        - ai_node | default(false) | bool
        - nvidia_metrics.rc | default(1) != 0

    - name: Warn when Ollama is not active
      ansible.builtin.debug:
        msg: >-
          WARN Ollama service is
          {{ ollama_service.stdout | default('unavailable') }}
      when:
        - ai_node | default(false) | bool
        - ollama_service.stdout | default('unknown') != 'active'


- name: Check Docker host health
  hosts: all
  gather_facts: false
  become: false

  tasks:
    - name: Check whether Docker is available
      ansible.builtin.command:
        argv:
          - docker
          - version
          - --format
          - "{{ '{{' }}.Server.Version{{ '}}' }}"
      register: docker_version
      changed_when: false
      failed_when: false
      when: docker_host | default(false) | bool

    - name: Read running Docker containers
      ansible.builtin.command:
        argv:
          - docker
          - ps
          - --format
          - "{{ '{{' }}.Names{{ '}}' }}"
      register: running_containers
      changed_when: false
      failed_when: false
      when:
        - docker_host | default(false) | bool
        - docker_version.rc | default(1) == 0

    - name: Read unhealthy Docker containers
      ansible.builtin.command:
        argv:
          - docker
          - ps
          - --filter
          - health=unhealthy
          - --format
          - "{{ '{{' }}.Names{{ '}}' }}"
      register: unhealthy_containers
      changed_when: false
      failed_when: false
      when:
        - docker_host | default(false) | bool
        - docker_version.rc | default(1) == 0

    - name: Display Docker health summary
      ansible.builtin.debug:
        msg:
          - "Host: {{ inventory_hostname }}"
          - "Docker version: {{ docker_version.stdout | default('unavailable') }}"
          - "Running containers: {{ running_containers.stdout_lines | default([]) | length }}"
          - "Unhealthy containers: {{ unhealthy_containers.stdout_lines | default([]) | length }}"
      when: docker_host | default(false) | bool

    - name: Warn when Docker is unavailable
      ansible.builtin.debug:
        msg: "WARN Docker is unavailable on configured Docker host"
      when:
        - docker_host | default(false) | bool
        - docker_version.rc | default(1) != 0

    - name: Warn when unhealthy Docker containers exist
      ansible.builtin.debug:
        msg: >-
          WARN Unhealthy containers:
          {{ unhealthy_containers.stdout_lines | join(', ') }}
      when:
        - docker_host | default(false) | bool
        - unhealthy_containers.stdout_lines | default([]) | length > 0
