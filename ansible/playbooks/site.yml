---
- name: Configure all hosts
  hosts: all
  become: true

  roles:
    - common
    - time
    - motd
    - issue
    

- name: Verify Docker hosts
  hosts: infrastructure:ai
  become: true
  roles:
    - docker

- name: Manage Homepage
  hosts: ubuntu-dev01
  become: true
  roles:
    - homepage

- name: Manage labtest container
  hosts: ubuntu-dev01
  become: true
  roles:
    - labtest
